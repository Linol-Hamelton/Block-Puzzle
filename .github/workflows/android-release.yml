name: Android Release

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: "App version name (e.g. 1.1.0)"
        required: true
        default: "1.0.1"
      build_number:
        description: "App version code (integer)"
        required: true
        default: "2"

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat <<'EOF' > android/key.properties
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=app/upload-keystore.jks
          EOF

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --reporter expanded

      - name: Build signed Android App Bundle
        run: >
          flutter build appbundle --release
          --build-name="${{ inputs.build_name }}"
          --build-number="${{ inputs.build_number }}"

      - name: Build signed Android APK
        run: >
          flutter build apk --release
          --build-name="${{ inputs.build_name }}"
          --build-number="${{ inputs.build_number }}"

      - name: Upload Android release AAB
        uses: actions/upload-artifact@v4
        with:
          name: block-puzzle-android-release-aab
          path: apps/mobile/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload Android release APK
        uses: actions/upload-artifact@v4
        with:
          name: block-puzzle-android-release-apk
          path: apps/mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
