name: Mobile CI

on:
  workflow_dispatch:
  push:
    paths:
      - "apps/mobile/**"
      - ".github/workflows/mobile-ci.yml"
  pull_request:
    paths:
      - "apps/mobile/**"
      - ".github/workflows/mobile-ci.yml"

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Tests
        run: flutter test --reporter expanded

      - name: Build Android debug APK
        run: flutter build apk --debug

      - name: Build Web release bundle
        run: flutter build web --release

      - name: Upload Android debug APK
        uses: actions/upload-artifact@v4
        with:
          name: block-puzzle-android-debug-apk
          path: apps/mobile/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

      - name: Upload Web release bundle
        uses: actions/upload-artifact@v4
        with:
          name: block-puzzle-web-release
          path: apps/mobile/build/web
          if-no-files-found: error
